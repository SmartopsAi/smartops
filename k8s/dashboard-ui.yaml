apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartops-dashboard-ui
  namespace: smartops-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartops-dashboard-ui
  template:
    metadata:
      labels:
        app: smartops-dashboard-ui
    spec:
      containers:
        - name: dashboard-ui
          image: smartops-dashboard-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: smartops-dashboard-ui
  namespace: smartops-dev
spec:
  selector:
    app: smartops-dashboard-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP