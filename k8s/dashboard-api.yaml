apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartops-dashboard-api
  namespace: smartops-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartops-dashboard-api
  template:
    metadata:
      labels:
        app: smartops-dashboard-api
    spec:
      containers:
        - name: dashboard-api
          image: registry.digitalocean.com/smartops-registry/smartops-dashboard-api:cloud-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5050
          env:
            - name: DASHBOARD_PORT
              value: "5050"
            - name: ORCH_URL
              value: "http://smartops-orchestrator:8001"
            - name: POLICY_ENGINE_URL
              value: "http://smartops-policy-engine:5051"
            - name: POLICY_ENGINE_AUDIT_PATH
              value: "/policy_engine/audit/policy_decisions.jsonl"
            - name: NOTIFICATION_SETTINGS_PATH
              value: "/policy_engine/audit/notification_settings.json"
            - name: NOTIFICATION_AUDIT_PATH
              value: "/policy_engine/audit/notification_audit.jsonl"
            - name: DASHBOARD_EVIDENCE_DIR
              value: "/policy_engine/audit/dashboard-runtime"
            - name: DASHBOARD_LATEST_EVIDENCE_PATH
              value: "/policy_engine/audit/dashboard-runtime/latest_anomaly_evidence.json"
            - name: DASHBOARD_ANOMALY_HISTORY_PATH
              value: "/policy_engine/audit/dashboard-runtime/anomaly_history.jsonl"
            - name: PROMETHEUS_ENABLED
              value: "false"
            - name: SMARTOPS_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartops-admin-secret
                  key: SMARTOPS_ADMIN_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartops-openai-secret
                  key: OPENAI_API_KEY
            - name: OPENAI_MODEL
              valueFrom:
                secretKeyRef:
                  name: smartops-openai-secret
                  key: OPENAI_MODEL
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: smartops-smtp-secret
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: smartops-smtp-secret
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smartops-smtp-secret
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartops-smtp-secret
                  key: SMTP_PASSWORD
            - name: SMTP_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: smartops-smtp-secret
                  key: SMTP_FROM_EMAIL
            - name: SMTP_USE_TLS
              valueFrom:
                secretKeyRef:
                  name: smartops-smtp-secret
                  key: SMTP_USE_TLS
            - name: EMAIL_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: smartops-sendgrid-secret
                  key: EMAIL_PROVIDER
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartops-sendgrid-secret
                  key: SENDGRID_API_KEY
            - name: SENDGRID_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: smartops-sendgrid-secret
                  key: SENDGRID_FROM_EMAIL
            - name: SENDGRID_API_URL
              valueFrom:
                secretKeyRef:
                  name: smartops-sendgrid-secret
                  key: SENDGRID_API_URL
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: smartops-twilio-secret
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: smartops-twilio-secret
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_WHATSAPP_FROM
              valueFrom:
                secretKeyRef:
                  name: smartops-twilio-secret
                  key: TWILIO_WHATSAPP_FROM
            - name: TWILIO_WHATSAPP_TO
              valueFrom:
                secretKeyRef:
                  name: smartops-twilio-secret
                  key: TWILIO_WHATSAPP_TO
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: runtime-data
              mountPath: /data/runtime
              readOnly: true
            - name: policy-audit
              mountPath: /policy_engine/audit
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5050
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5050
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: runtime-data
          configMap:
            name: smartops-runtime
        - name: policy-audit
          persistentVolumeClaim:
            claimName: policy-audit-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: smartops-dashboard-api
  namespace: smartops-dev
spec:
  selector:
    app: smartops-dashboard-api
  ports:
    - name: http
      port: 5050
      targetPort: 5050
  type: ClusterIP
