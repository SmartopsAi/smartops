apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartops-agent-diagnose
  namespace: smartops-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartops-agent-diagnose
  template:
    metadata:
      labels:
        app: smartops-agent-diagnose
    spec:
      containers:
        - name: agent-diagnose
          image: smartops-agent-diagnose:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ERP_URL
              value: "http://smartops-erp-simulator:8000"
            - name: ORCH_URL
              value: "http://smartops-orchestrator:8001"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
