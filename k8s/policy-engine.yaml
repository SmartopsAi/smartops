apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartops-policy-engine
  namespace: smartops-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartops-policy-engine
  template:
    metadata:
      labels:
        app: smartops-policy-engine
    spec:
      containers:
        - name: policy-engine
          image: registry.digitalocean.com/smartops-registry/smartops-policy-engine:cloud-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          env:
            - name: POLICY_ENGINE_PORT
              value: "8002"
            - name: POLICY_ENGINE_AUDIT_PATH
              value: "/policy_engine/audit/policy_decisions.jsonl"
          volumeMounts:
            - name: runtime-data
              mountPath: /apps/policy_engine/data
            - name: policy-audit
              mountPath: /policy_engine/audit
      volumes:
        - name: runtime-data
          emptyDir: {}
        - name: policy-audit
          persistentVolumeClaim:
            claimName: policy-audit-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: smartops-policy-engine
  namespace: smartops-dev
spec:
  selector:
    app: smartops-policy-engine
  ports:
    - name: http
      port: 5051
      targetPort: 8002
