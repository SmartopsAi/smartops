apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartops-erp-simulator
  namespace: smartops-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartops-erp-simulator
  template:
    metadata:
      labels:
        app: smartops-erp-simulator
    spec:
      containers:
        - name: erp-simulator
          image: registry.digitalocean.com/smartops-registry/smartops-erp-simulator:cloud-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: smartops-erp-simulator
  namespace: smartops-dev
spec:
  selector:
    app: smartops-erp-simulator
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP



