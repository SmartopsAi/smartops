apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartops-agent-detect
  namespace: smartops-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartops-agent-detect
  template:
    metadata:
      labels:
        app: smartops-agent-detect
    spec:
      containers:
        - name: agent-detect
          image: smartops-agent-detect:latest
          imagePullPolicy: IfNotPresent

          env:
            # Detection profile
            - name: PROFILE
              value: "simulator"

            # Orchestrator (for POST /signals)
            - name: ORCH_URL
              value: "http://smartops-orchestrator:8001"

            # 🔥 ERP simulator service (for /metrics)
            - name: ERP_URL
              value: "http://smartops-erp-simulator:8000"

            # 🔥 Prometheus service (for Odoo mode)
            - name: PROMETHEUS_BASE
              value: "http://smartops-prometheus-operator:9090"

            # Optional tuning
            - name: METRICS_POLL_INTERVAL
              value: "5"

          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
