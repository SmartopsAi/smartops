apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartops-dashboard
  namespace: smartops-dev
  labels:
    app: smartops-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartops-dashboard
  template:
    metadata:
      labels:
        app: smartops-dashboard
    spec:
      containers:
        - name: dashboard
          image: smartops-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5050

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          env:
            - name: DASHBOARD_PORT
              value: "5050"
            - name: ORCH_URL
              value: "http://smartops-orchestrator:8001"
            - name: POLICY_ENGINE_URL
              value: "http://smartops-policy-engine:5051"
            - name: PROMETHEUS_ENABLED
              value: "false"

          volumeMounts:
            - name: runtime-data
              mountPath: /data/runtime
              readOnly: true

      volumes:
        - name: runtime-data
          configMap:
            name: smartops-runtime
